<!DOCTYPE html>
<html>
<head>
  <title>Smart Transplanter Map</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4fff4;
    }

    h1 {
      color: green;
    }

    #map {
      display: grid;
      grid-template-columns: repeat(auto-fill, 40px);
      gap: 10px;
      justify-content: center;
      margin-top: 30px;
    }

    .cell {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #ccc;
    }

    .planted {
      background: green;
    }

    .missed {
      background: red;
    }
  </style>
</head>

<body>

<h1>🚜 Smart Plantation Map</h1>

<div id="map"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAo2-BGrCrO3N8pjTqaoAPH34_o6-Eueyo",
    databaseURL: "https://tifan-66317-default-rtdb.asia-southeast1.firebasedatabase.app"
  };

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const mapDiv = document.getElementById("map");

  let lastCount = 0;

  // 🔁 Listen to trigger ONLY
  db.ref("transplanter/trigger").on("value", (snap) => {
    let trigger = snap.val();

    if (trigger === "YES") {

      // get latest count
      db.ref("transplanter/count").once("value", (countSnap) => {
        let currentCount = countSnap.val();

        if (currentCount > lastCount) {
          addBubble("planted");  // 🟢
        } else {
          addBubble("missed");   // 🔴
        }

        lastCount = currentCount;
      });
    }
  });

  function addBubble(type) {
    const div = document.createElement("div");
    div.classList.add("cell");

    if (type === "planted") div.classList.add("planted");
    if (type === "missed") div.classList.add("missed");

    mapDiv.appendChild(div);
  }
</script>

</body>
</html>
